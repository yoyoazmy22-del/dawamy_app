name: dawamy
description: Dawamy - Premium Shift Scheduling Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # UI Components
  shimmer: ^3.0.0
  animations: ^2.0.8
  flutter_animate: ^4.3.0
  glassmorphism: ^2.0.0
  flutter_staggered_animations: ^1.1.0
  cached_network_image: ^3.3.0

  # Charts
  fl_chart: ^0.66.0

  # Icons
  flutter_feather_icons: ^2.0.0+1
  ionicons: ^0.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.2
  webview_flutter: ^4.4.2
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.0
  permission_handler: ^11.1.0
  flutter_local_notifications: ^17.0.0
  timeago: ^3.6.1
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  dotted_border: ^2.1.0

  # HTTP
  http: ^1.1.2
  dio: ^5.4.0

  # Subscription
  in_app_purchase: ^3.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
